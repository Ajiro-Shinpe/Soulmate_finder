<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GF-Finder Pro Max v4.0 🚀</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 15px;
        }
        .progress-bar {
            background-color: #ff4d6d;
        }
        #status-text {
            font-family: monospace;
            font-size: 1.2rem;
            color: #00ffcc;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg p-4">
                <div class="text-center mb-4">
                    <h2>💖 GF-Finder AI</h2>
                    <p class="text-info">Find your perfect match in seconds!</p>
                </div>
                
                <form id="finderForm">
                    <div class="mb-3">
                        <label class="form-label">Your Name</label>
                        <input type="text" id="userName" class="form-control bg-dark text-white border-secondary" placeholder="Enter full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Your Age</label>
                        <input type="number" id="userAge" class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Preferred Gender</label>
                        <select id="userGender" class="form-select bg-dark text-white border-secondary">
                            <option value="female">Female</option>
                            <option value="male">Male</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Upload your photo (AI Analysis)</label>
                        <input type="file" class="form-control bg-dark text-white border-secondary">
                    </div>
                    <button type="submit" class="btn btn-danger w-100 fw-bold">SEARCH FOR SOULMATE 🔍</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="searchModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-info">
            <div class="modal-body text-center py-5">
                <div class="spinner-border text-info mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
                <h4 class="mb-3">AI Engine Processing...</h4>
                <div class="progress mb-3" style="height: 10px;">
                    <div id="pBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                </div>
                <p id="status-text">Initializing satellite uplink...</p>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-danger">
            <div class="modal-header border-secondary">
                <h5 class="modal-title text-danger">⚠️ System Error ⚠️</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center p-5">
                <h1 style="font-size: 4rem;">404</h1>
                <p class="lead">NO MATCH FOUND 💀</p>
                <p>The AI searched the entire known reality. It appears your soulmate does not exist in this dimension. Maybe try a different planet? 👽</p>
                <button class="btn btn-outline-light mt-3" data-bs-dismiss="modal">Close & Cry</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const form = document.getElementById('finderForm');
    const searchModal = new bootstrap.Modal(document.getElementById('searchModal'));
    const resultModal = new bootstrap.Modal(document.getElementById('resultModal'));
    const statusText = document.getElementById('status-text');
    const pBar = document.getElementById('pBar');

    const locations = [
        "Scanning Asia... 🌏",
        "Checking Africa... 🌍",
        "Analyzing Europe... 🌎",
        "Searching Americas... 🗺️",
        "Deep Scan: Antarctica... ❄️",
        "Pinging Australian Outback... 🦘",
        "Signal reached Moon Base... 🌙",
        "Scanning Mars Rover Logs... 🔴",
        "Checking Jupiter's Moons... 🪐",
        "Entering Andromeda Galaxy... 🌌",
        "Scanning Parallel Universes... 🌀",
        "Querying the Cosmos... ✨",
        "Finalizing Search in the Matrix... 💻"
    ];

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. Save data to LocalStorage (as requested)
        const userData = {
            name: document.getElementById('userName').value,
            age: document.getElementById('userAge').value,
            gender: document.getElementById('userGender').value,
            timestamp: new Date().toLocaleString()
        };
        localStorage.setItem('target_data', JSON.stringify(userData));

        // 2. Show the searching modal
        searchModal.show();

        // 3. Start the fake search sequence
        let index = 0;
        const interval = setInterval(() => {
            if (index < locations.length) {
                statusText.innerText = locations[index];
                let progress = ((index + 1) / locations.length) * 100;
                pBar.style.width = progress + "%";
                index++;
            } else {
                clearInterval(interval);
                searchModal.hide();
                resultModal.show();
            }
        }, 1200); // Changes text every 1.2 seconds
    });
</script>

</body>
      </html>
